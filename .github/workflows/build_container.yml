# .github/workflows/build_container.yml
# Docker イメージをビルドして GHCR に push する GitHub Actions workflow
# リポジトリ: https://github.com/iwaokimura/face_protect
#
# SIF 取得コマンド（root 不要）:
#   singularity pull face_protect.sif \
#       docker://ghcr.io/iwaokimura/face_protect:latest

name: Build and Push to GHCR

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'face_protect.py'
      - '.github/workflows/build_container.yml'
  workflow_dispatch:   # Actions 画面から手動実行も可能

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: iwaokimura/face_protect

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # GHCR への push に必要

    steps:
      - name: リポジトリを checkout
        uses: actions/checkout@v4

      - name: GHCR にログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: iwaokimura
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: メタデータ生成（タグ・ラベル）
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=face_protect
            org.opencontainers.image.description=Adversarial perturbation for face recognition evasion
            org.opencontainers.image.url=https://github.com/iwaokimura/face_protect

      - name: Docker Buildx セットアップ
        uses: docker/setup-buildx-action@v3

      - name: レイヤーキャッシュ設定
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: ビルド & GHCR へ push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to:   type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: キャッシュ入れ替え（容量肥大化防止）
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: 完了メッセージ
        run: |
          echo "=============================================="
          echo "イメージが GHCR に push されました。"
          echo ""
          echo "SIF 取得コマンド（実行マシン上で）:"
          echo "  singularity pull face_protect.sif docker://ghcr.io/iwaokimura/face_protect:latest"
          echo ""
          echo "パッケージページ:"
          echo "  https://github.com/iwaokimura?tab=packages"
          echo "=============================================="
